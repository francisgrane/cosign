name: Build Sign

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image
        run: |
          docker build -t docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image
        run: |
          cosign sign --yes docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}

      - name: Verify Signature
        run: |
          cosign verify \
            --certificate-identity="https://github.com/francisgrane/cosign/.github/workflows/blank.yml@refs/heads/master" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            docker.io/${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
